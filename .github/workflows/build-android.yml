name: Android Build Action
on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'


jobs:
  Build-Android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    - name: Build Release
      run: cd android/ && ./gradlew clean assembleRelease --max-workers=1
    - name: Build Debug
      run: cd android/ && ./gradlew build
    - name: Upload builds
      uses: actions/upload-artifact@v4
      with:
        name: mobapp-game-android
        path: ${{ github.workspace }}/android/app/build/outputs/apk/*

